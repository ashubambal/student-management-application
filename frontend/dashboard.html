<!DOCTYPE html>
<html>
<head>
<title>Student Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1> Student Dashboard</h1>

<div class="dashboard-cards">

<div class="card">
<h3>Total Students</h3>
<p id="totalStudents">0</p>
</div>

<div class="card">
<h3>Branch</h3>
<p id="branchName">Computer</p>
</div>

<div class="card">
<h3>Year</h3>
<p id="year">3</p>
</div>

</div>

<button class="logout-btn" onclick="logout()">Logout</button>

<h2>My Profile</h2>

<table>

<thead>
<tr>
<th>Photo</th>
<th>Name</th>
<th>Age</th>
<th>Branch</th>
<th>Year</th>
<th>Email</th>
</tr>
</thead>

<tbody id="students">

</tbody>

</table>

</div>

<script src="dashboard.js"></script>

</body>
</html>
