name: Build and Push Docker Images
on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

# ---------- Backend Image ----------

      - name: Build Backend Image
        run: | 
          docker build -t softconsist/student-backend:latest backend/

      - name: Push Backend Image 
        run: | 
          docker push softconsist/student-backend:latest

# ---------- Backend Image ----------

      - name: Build Frontend Image
        run: | 
          docker build -t softconsist/student-frontend:latest frontend/

      - name: Push Frontend Image 
        run: | 
          docker push softconsist/student-frontend:latest