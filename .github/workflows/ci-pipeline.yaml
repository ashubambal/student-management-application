name: Build and Push Docker Images
on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set version tag
        run: echo "VERSION=v0.0.${GITHUB_RUN_NUMBER}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ---------- Backend Image ----------
      - name: Build Backend Image
        run: |
          docker build -t softconsist/student-backend:${VERSION} backend/

      - name: Push Backend Image
        run: |
          docker push softconsist/student-backend:${VERSION}

      # ---------- Frontend Image ----------
      - name: Build Frontend Image
        run: |
          docker build -t softconsist/student-frontend:${VERSION} frontend/

      - name: Push Frontend Image
        run: |
          docker push softconsist/student-frontend:${VERSION}